      <stop offset="0%" stop-color="#58f0ff" stop-opacity="0.95"/>
      <stop offset="44%" stop-color="#1896c9" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#0a1f3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d9faff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#58f0ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#58f0ff" stop-opacity="0"/>
