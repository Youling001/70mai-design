    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7cf7ff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#2a73ff" stop-opacity="0.34"/>
