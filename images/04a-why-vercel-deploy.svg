      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18  0 0 0 0 0.82  0 0 0 0 1  0 0 0 .85 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#bff8ff" opacity="0.12"/>
    </pattern>
  </defs>

